services:
  mongodb:
    image: mongo:8.0
    container_name: interneers_mongodb
    restart: always
    ports:
      - "27017:27017" 
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend/python
      dockerfile: Dockerfile
    container_name: django_backend
    restart: always
    env_file:
      - ./backend/python/.env
    depends_on:
      - mongodb
    environment:
      - MONGO_HOST=mongodb
      - MONGO_DB=interneers_lab
      - MONGO_PORT=27017
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
