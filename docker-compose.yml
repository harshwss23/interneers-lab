services:
  mongodb:
    image: mongo:8.0
    container_name: mongodb_service
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_data:/data/db

  backend:
    build:
      context: ./backend/python
      dockerfile: Dockerfile
    container_name: django_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/python/.env
    depends_on:
      - mongodb
    environment:
      - MONGO_HOST=mongodb
      - MONGO_DB=ims_db
      - MONGO_PORT=27017

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

