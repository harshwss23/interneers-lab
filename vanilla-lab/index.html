<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla Product Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Vanilla JS Product Lab</h1>
            <p>Demonstrating plain HTML, CSS Flexbox/Grid, and Fetch API.</p>
        </header>

        <main id="product-container">
            <!-- Product tiles will be injected here by script.js -->
            <div class="product-card" id="loading-card">
                <div class="skeleton-image"></div>
                <div class="skeleton-text"></div>
                <div class="skeleton-text short"></div>
            </div>
        </main>

        <footer>
            <button id="fetch-btn">Fetch Products</button>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
